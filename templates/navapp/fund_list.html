{% extends "base.html" %}
{% block content %}
<div class="page-heading"><div><p class="eyebrow">主檔資料</p><h1>基金</h1></div><a class="button primary" href="{% url 'fund-create' %}">建立基金</a></div>
<section class="panel table-wrap"><table class="fund-list-table mobile-cards"><thead><tr><th>代碼</th><th>基金</th><th class="mobile-hide">註冊地</th><th class="mobile-hide">股份類別</th><th>狀態</th><th>操作</th></tr></thead><tbody>{% for fund in funds %}<tr><td data-label="代碼">{{ fund.short_code|upper }}</td><td data-label="基金">{{ fund.display_name }}</td><td class="mobile-hide" data-label="註冊地">{{ fund.domicile }}</td><td class="mobile-hide" data-label="股份類別">{{ fund.share_classes.count }}</td><td data-label="狀態"><span class="status">{{ fund.is_active|yesno:"啟用,已封存" }}</span></td><td data-label="操作"><span class="row-actions"><a href="{% url 'fund-edit' fund.pk %}">編輯</a><a href="{% url 'share-class-create' fund.pk %}">新增類別</a></span></td></tr>{% empty %}<tr><td colspan="6">尚未設定基金。</td></tr>{% endfor %}</tbody></table></section>
{% endblock %}
