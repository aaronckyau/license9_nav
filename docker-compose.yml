services:
  db:
    image: postgres:17-bookworm
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-nav_reports}
      POSTGRES_USER: ${POSTGRES_USER:-nav_app}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in .env}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 12
    networks: [backend]

  web:
    build: .
    restart: unless-stopped
    env_file: ${ENV_FILE:-.env}
    environment:
      DATABASE_HOST: db
      DATABASE_PORT: "5432"
      DJANGO_DEBUG: "false"
      MEDIA_ROOT: /app/media
      LIBREOFFICE_BINARY: soffice
    depends_on:
      db:
        condition: service_healthy
    expose: ["8000"]
    volumes:
      - media_data:/app/media
      - static_data:/app/staticfiles
    healthcheck:
      test: ["CMD", "curl", "--fail", "--silent", "http://127.0.0.1:8000/readyz"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 20s
    networks: [backend, frontend]

  nginx:
    image: nginx:1.27-alpine
    restart: unless-stopped
    depends_on:
      web:
        condition: service_healthy
    ports:
      - "${BIND_ADDRESS:-127.0.0.1}:${HTTP_PORT:-8000}:80"
    volumes:
      - ./deploy/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - static_data:/app/staticfiles:ro
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://127.0.0.1/healthz"]
      interval: 10s
      timeout: 5s
      retries: 6
    networks: [frontend]

volumes:
  postgres_data:
  media_data:
  static_data:

networks:
  backend:
    internal: true
  frontend:
